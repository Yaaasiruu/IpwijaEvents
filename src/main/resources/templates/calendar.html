<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Event - Ipwija Events</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.css" rel="stylesheet">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </aside>

        <!-- MAIN -->
        <div class="main">

            <!-- CONTENT -->
            <main class="content">

                <!-- PAGE TITLE -->
                <div class="page-title">
                    <h2>Kalender Event</h2>
                    <p>
                        Lihat seluruh jadwal seminar,
                        workshop, dan kegiatan kampus.
                    </p>
                </div>

                <!-- PANEL KALENDER -->
                <div class="panel">
                    <div id="calendar"></div>
                </div>

                <!-- PANEL EVENT BULAN INI -->
                <div class="panel">

                    <div class="panel-head">
                        <h2>Event Bulan Ini</h2>

                        <a th:href="@{/events}" class="link">
                            Lihat Semua
                        </a>
                    </div>

                    <!-- Jika tidak ada event -->
                    <div th:if="${#lists.isEmpty(eventsBulanIni)}"
                        style="text-align:center;padding:35px;color:#94a3b8;">

                        <i class="ti ti-calendar-off" style="font-size:40px;margin-bottom:10px;"></i>

                        <p>Tidak ada event terbaru untuk bulan ini.</p>

                    </div>

                    <!-- Jika ada event -->
                    <div th:each="event : ${eventsBulanIni}" class="event-row">

                        <div class="event-thumb">
                            <i class="ti ti-calendar-event"></i>
                        </div>

                        <div class="event-info">

                            <h3 th:text="${event.namaEvent}">
                                Nama Event
                            </h3>

                            <div class="event-meta">

                                <span>
                                    <i class="ti ti-calendar"></i>

                                    <span th:text="${#temporals.format(event.tanggal,'dd MMM yyyy')}"></span>

                                    |

                                    <span th:text="${event.jamMulai}"></span>
                                </span>

                                <span>
                                    <i class="ti ti-map-pin"></i>

                                    <span th:text="${event.lokasi}"></span>
                                </span>

                            </div>

                        </div>

                        <span class="badge" th:classappend="${
                event.tanggal.isBefore(T(java.time.LocalDate).now()) ? ' selesai' :
                (event.tanggal.isEqual(T(java.time.LocalDate).now()) ? ' terdaftar' : ' menunggu')
              }">

                            <span th:text="${
                event.tanggal.isBefore(T(java.time.LocalDate).now()) ? 'Selesai' :
                (event.tanggal.isEqual(T(java.time.LocalDate).now()) ? 'Berlangsung' : 'Akan Datang')
            }"></span>

                        </span>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <!-- FullCalendar -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>

    <!-- JS Kalender -->
    <script src="/js/calendar.js"></script>

</body>

</html>
