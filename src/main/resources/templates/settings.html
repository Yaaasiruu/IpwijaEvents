<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pengaturan Akun - Ganesha Event Connect</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/settings.css">

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </aside>

        <div class="main">

            <!-- CONTENT -->
            <main class="content">

                <div class="page-title">
                    <h2>Pengaturan Akun</h2>
                    <p>Kelola informasi profil dan keamanan akun Anda.</p>
                </div>

                <div class="settings-grid">

                    <!-- Profil -->
                    <div class="panel">

                        <div class="profile-setting">

                            <div class="profile-photo" th:text="${#strings.substring(currentUser.nama,0,1)}">
                                A
                            </div>

                            <h3 th:text="${currentUser.nama}"></h3>

                            <p th:text="${currentUser.email}"></p>

                            <span class="role-chip" th:text="${currentUser.role}">
                            </span>

                        </div>

                        <form th:action="@{/settings/update-profile}" method="post">

                            <div class="form-grid">

                                <div class="form-group">
                                    <label>Nama Lengkap</label>
                                    <input type="text" name="nama" th:value="${currentUser.nama}">
                                </div>

                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" name="email" th:value="${currentUser.email}">
                                </div>

                                <div class="form-group">
                                    <label>NIM</label>
                                    <input type="text" th:value="${currentUser.nim}" readonly>
                                </div>

                                <div class="form-group">
                                    <label>Program Studi</label>
                                    <input type="text" th:value="${currentUser.prodi}" readonly>
                                </div>

                                <div class="form-group">
                                    <label>Kelas</label>
                                    <input type="text" th:value="${currentUser.kelas}" readonly>
                                </div>

                            </div>

                            <button class="primary" type="submit">
                                <i class="bi bi-floppy-fill"></i>
                                Simpan Perubahan
                            </button>

                        </form>

                    </div>

                    <!-- Password -->
                    <div class="panel">

                        <div class="panel-head">
                            <h2>Keamanan Akun</h2>
                        </div>

                        <form th:action="@{/settings/update-password}" method="post">

                            <label>Password Lama</label>
                            <input type="password" name="oldPassword">

                            <label>Password Baru</label>
                            <input type="password" name="newPassword">

                            <label>Konfirmasi Password Baru</label>
                            <input type="password" name="confirmPassword">

                            <button class="primary" type="submit">
                                <i class="bi bi-shield-lock-fill"></i>
                                Ubah Password
                            </button>

                        </form>

                    </div>

                </div>

            </main>

        </div>

    </div>

</body>

</html>
