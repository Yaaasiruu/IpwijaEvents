<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pengaturan Akun — Ganesha Event Connect</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div th:replace="fragments/sidebar :: sidebar"></div>
    </aside>

    <div class="main">

        <header class="topbar">
            <div class="search-box">
                <i class="ti ti-search"></i>
                <input type="text" placeholder="Cari event, workshop, atau seminar...">
            </div>

            <div class="top-actions">
                <div class="icon-btn">
                    <i class="ti ti-bell"></i>
                    <span class="dot"></span>
                </div>

                <div class="profile-chip">
                    <div class="avatar">AP</div>
                    <div>
                        <div class="pname">Adi Pratama</div>
                        <div class="prole">Mahasiswa</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">

            <section class="page-title">
                <h1>Pengaturan Akun ⚙️</h1>
                <p>Kelola informasi profil, keamanan, dan data akun Anda.</p>
            </section>

            <div class="panel">

                <div class="panel-head">
                    <h2>Informasi Profil</h2>
                </div>

                <form th:action="@{/settings/update-profile}" method="post" enctype="multipart/form-data">

                    <div class="profile-setting">
                        <div class="profile-photo">
                            <img th:if="${user != null && user.foto != null}"
                                 th:src="@{'/uploads/' + ${user.foto}}">
                            <span th:unless="${user != null && user.foto != null}">
                                AP
                            </span>
                        </div>

                        <label class="upload-btn">
                            <i class="ti ti-camera"></i>
                            Ganti Foto Profil
                            <input type="file" name="foto" hidden>
                        </label>
                    </div>

                    <label>Nama Lengkap</label>
                    <input type="text" name="nama"
                           th:value="${user != null ? user.nama : ''}"
                           placeholder="Masukkan nama lengkap">

                    <label>Email</label>
                    <input type="email" name="email"
                           th:value="${user != null ? user.email : ''}"
                           placeholder="Masukkan email">

                    <button class="primary" type="submit">
                        <i class="ti ti-device-floppy"></i>
                        Simpan Perubahan
                    </button>

                </form>

            </div>

            <div class="panel">

                <div class="panel-head">
                    <h2>Keamanan Akun</h2>
                </div>

                <form th:action="@{/settings/update-password}" method="post">

                    <label>Password Lama</label>
                    <input type="password" name="oldPassword"
                           placeholder="Masukkan password lama">

                    <label>Password Baru</label>
                    <input type="password" name="newPassword"
                           placeholder="Masukkan password baru">

                    <label>Konfirmasi Password Baru</label>
                    <input type="password" name="confirmPassword"
                           placeholder="Ulangi password baru">

                    <button class="primary" type="submit">
                        <i class="ti ti-lock"></i>
                        Ubah Password
                    </button>

                </form>

            </div>

        </main>

    </div>

</div>

</body>
</html>
