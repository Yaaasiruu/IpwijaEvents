<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profil Saya - Ganesha Event Connect</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/profile.css">

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </aside>

        <!-- MAIN -->
        <div class="main">

            <main class="content">

                <div class="page-title">

                    <h2>Profil Saya</h2>

                    <p>
                        Informasi akun mahasiswa yang sedang digunakan.
                    </p>

                </div>

                <div class="panel profile-card">

                    <!-- Header Profil -->
                    <div class="profile-header">

                        <div class="profile-photo" th:text="${#strings.substring(currentUser.nama,0,1)}">
                            A
                        </div>

                        <h2 th:text="${currentUser.nama}">
                            Adi Pratama
                        </h2>

                        <p class="profile-email">
                            <i class="bi bi-envelope-fill"></i>
                            <span th:text="${currentUser.email}"></span>
                        </p>

                        <span class="role-chip"
                            th:text="${currentUser.role == 'ADMIN'} ? 'Administrator' : 'Mahasiswa Aktif'">
                        </span>

                    </div>

                    <hr>

                    <!-- Detail Profil -->
                    <div class="profile-detail">

                        <div class="detail-card">

                            <div class="detail-icon">
                                <i class="bi bi-person-vcard-fill"></i>
                            </div>

                            <div>

                                <small>NIM</small>

                                <strong th:text="${currentUser.nim}">
                                    220102045
                                </strong>

                            </div>

                        </div>

                        <div class="detail-card">

                            <div class="detail-icon">
                                <i class="bi bi-mortarboard-fill"></i>
                            </div>

                            <div>

                                <small>Program Studi</small>

                                <strong th:text="${currentUser.prodi}">
                                    Teknik Informatika
                                </strong>

                            </div>

                        </div>

                        <div class="detail-card">

                            <div class="detail-icon">
                                <i class="bi bi-building-fill"></i>
                            </div>

                            <div>

                                <small>Kelas</small>

                                <strong th:text="${currentUser.kelas}">
                                    TI-3B
                                </strong>

                            </div>

                        </div>

                        <div class="detail-card">

                            <div class="detail-icon">
                                <i class="bi bi-person-badge-fill"></i>
                            </div>

                            <div>

                                <small>Role</small>

                                <strong th:text="${currentUser.role}">
                                    Mahasiswa
                                </strong>

                            </div>

                        </div>

                    </div>

                </div>

            </main>

        </div>

    </div>

</body>

</html>
