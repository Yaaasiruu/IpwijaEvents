<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi - Ipwija Events</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/absen.css">
    <link rel="stylesheet" href="/css/sidebar.css">
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div th:replace="fragments/sidebar :: sidebar"></div>
    </aside>

    <div class="main">

        <main class="content">

            <div class="page-title">
                <h2>Absensi</h2>
                <p>
                    Lakukan absensi dan lihat riwayat kehadiran event Anda.
                </p>
            </div>

            <div class="panel">

                <div class="panel-head">
                    <h2>Event yang Belum Diabsen</h2>
                </div>

                <div th:if="${#lists.isEmpty(pendingRegistrations)}">

                    <div class="empty-state">

                        <i class="ti ti-calendar-off"></i>

                        <h3>Belum ada event baru yang diikuti</h3>

                        <p>
                            Semua event yang Anda ikuti sudah selesai dihadiri.
                        </p>

                    </div>

                </div>

                <div th:unless="${#lists.isEmpty(pendingRegistrations)}">

                    <div class="event-row"
                         th:each="reg : ${pendingRegistrations}">

                        <div class="event-thumb">

                            <img th:if="${reg.event.poster != null and !#strings.isEmpty(reg.event.poster)}"
                                 th:src="@{'/uploads/poster/' + ${reg.event.poster}}"
                                 th:alt="${reg.event.namaEvent}">

                            <img th:if="${reg.event.poster == null or #strings.isEmpty(reg.event.poster)}"
                                 src="https://placehold.co/120x120?text=No+Image"
                                 alt="Poster Default">

                        </div>

                        <div class="event-info">

                            <h3 th:text="${reg.event.namaEvent}"></h3>

                            <div class="event-meta">

                                <span>
                                    <i class="ti ti-calendar"></i>
                                    <span th:text="${#temporals.format(reg.event.tanggal,'dd MMM yyyy')}"></span>
                                </span>

                                <span>
                                    <i class="ti ti-clock"></i>

                                    <span th:text="${#temporals.format(reg.event.jamMulai,'HH:mm')}"></span>

                                    -

                                    <span th:text="${#temporals.format(reg.event.jamSelesai,'HH:mm')}"></span>

                                </span>

                                <span>
                                    <i class="ti ti-map-pin"></i>

                                    <span th:text="${reg.event.lokasi}"></span>
                                </span>

                            </div>

                        </div>

                        <form th:action="@{/attendance/{id}(id=${reg.id})}"
                              method="post">

                            <button type="submit" class="primary">

                                <i class="ti ti-check"></i>

                                Absen Sekarang

                            </button>

                        </form>

                    </div>

                </div>

            </div>

            <div class="panel">

                <div class="panel-head">
                    <h2>Riwayat Kehadiran</h2>
                </div>

                <table class="table">

                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Tanggal</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:if="${#lists.isEmpty(attendances)}">

                            <td colspan="3" style="text-align:center">

                                Belum ada riwayat absensi.

                            </td>

                        </tr>

                        <tr th:each="attendance : ${attendances}">

                            <td th:text="${attendance.registration.event.namaEvent}">
                            </td>

                            <td th:text="${#temporals.format(attendance.registration.event.tanggal,'dd MMM yyyy')}">
                            </td>

                            <td>

                                <span th:if="${attendance.hadir}"
                                      class="status success">

                                    Hadir

                                </span>

                                <span th:unless="${attendance.hadir}"
                                      class="status danger">

                                    Belum Hadir

                                </span>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </main>

    </div>

</div>

</body>
</html>
