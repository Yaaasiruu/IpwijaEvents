<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Saya - Ganesha Event Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div th:replace="fragments/sidebar :: sidebar"></div>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- CONTENT -->
        <main class="content">

            <div class="page-title">
                <h2>Event Saya</h2>
                <p>Daftar event yang telah Anda ikuti.</p>
            </div>

            <div class="my-event-list">

                <div class="my-event-card">
                    <div class="event-left">

                        <div class="event-icon">
                            <i class="ti ti-palette"></i>
                        </div>

                        <div>
                            <h3>Workshop UI/UX Design</h3>

                            <p>
                                <i class="ti ti-calendar"></i>
                                15 Juli 2026
                            </p>

                            <p>
                                <i class="ti ti-map-pin"></i>
                                Zoom Meeting
                            </p>
                        </div>

                    </div>

                    <span class="status success">
                        Terdaftar
                    </span>
                </div>

                <div class="my-event-card">
                    <div class="event-left">

                        <div class="event-icon">
                            <i class="ti ti-brain"></i>
                        </div>

                        <div>
                            <h3>Seminar Artificial Intelligence</h3>

                            <p>
                                <i class="ti ti-calendar"></i>
                                20 Juli 2026
                            </p>

                            <p>
                                <i class="ti ti-map-pin"></i>
                                Auditorium Kampus
                            </p>
                        </div>

                    </div>

                    <span class="status waiting">
                        Menunggu Absensi
                    </span>
                </div>

            </div>

        </main>

    </div>

</div>

</body>
</html>
