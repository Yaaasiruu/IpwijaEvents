<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Saya - Ipwija Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </aside>

        <!-- MAIN -->
        <div class="main">

            <!-- CONTENT -->
            <main class="content">

                <div class="page-title">
                    <h2>Event Saya</h2>
                    <p>Daftar event yang telah Anda ikuti.</p>
                </div>

                <div class="my-event-list">

                    <div class="my-event-card" th:each="registration : ${registrations}">

                        <!-- Poster -->
                        <div class="event-poster">

                            <img th:src="@{'/uploads/poster/' + ${registration.event.poster}}" alt="Poster Event">

                        </div>

                        <!-- Detail -->
                        <div class="event-content">

                            <span class="event-category" th:text="${registration.event.kategori}">
                            </span>

                            <h3 th:text="${registration.event.namaEvent}">
                            </h3>

                            <div class="event-info">

                                <p>
                                    <i class="ti ti-calendar"></i>

                                    <span th:text="${#temporals.format(registration.event.tanggal,'dd MMM yyyy')}">
                                    </span>

                                </p>

                                <p>
                                    <i class="ti ti-clock"></i>

                                    <span
                                        th:text="${registration.event.jamMulai + ' - ' + registration.event.jamSelesai}">
                                    </span>

                                </p>

                                <p>
                                    <i class="ti ti-map-pin"></i>

                                    <span th:text="${registration.event.lokasi}">
                                    </span>

                                </p>

                            </div>

                            <div class="event-benefit">

                                <strong>Benefit</strong>

                                <p th:text="${registration.event.benefit}">
                                </p>

                            </div>

                        </div>

                        <!-- Status -->
                        <div class="event-action">

                            <span th:class="${registration.status == 'SELESAI'} ? 'status success' : 'status waiting'"
                                th:text="${registration.status}">
                            </span>

                            <a th:if="${registration.status != 'SELESAI'}" th:href="@{/attendance}" class="detail-btn">

                                Absen Event

                            </a>

                            <button th:if="${registration.status == 'SELESAI'}" type="button" class="detail-btn selesai"
                                onclick="eventSelesai()">

                                <i class="ti ti-circle-check"></i>
                                Event Selesai

                            </button>

                        </div>

                    </div>

                </div>

                <!-- Jika belum ada event -->

                <div class="empty-state" th:if="${#lists.isEmpty(registrations)}">

                    <i class="ti ti-calendar-off"></i>

                    <h2>Belum Ada Event</h2>

                    <p>Anda belum mendaftar event apapun.</p>

                </div>

            </main>

        </div>

    </div>

    <script>
        function eventSelesai() {
            alert("Anda sudah mengikuti event ini, silakan pilih event lain.");
        }
    </script>
</body>

</html>
