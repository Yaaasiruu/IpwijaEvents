<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat - Ganesha Event Connect</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div th:replace="fragments/sidebar :: sidebar"></div>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- CONTENT -->
        <main class="content">

            <div class="page-title">
                <h2>Sertifikat</h2>
                <p>Sertifikat yang berhasil Anda peroleh.</p>
            </div>

            <div class="certificate-container">

                <!-- Empty State -->
                <div class="empty-state"
                     th:if="${#lists.isEmpty(certificates)}">

                    <i class="bi bi-award-fill"
                       style="font-size:70px;color:#d1d5db;"></i>

                    <h2>Belum Ada Sertifikat</h2>

                    <p>
                        Selesaikan event terlebih dahulu agar sertifikat dapat diterbitkan.
                    </p>

                </div>

                <!-- List Sertifikat -->
                <div class="certificate-card"
                     th:each="certificate : ${certificates}">

                    <div class="stat-icon icon-gold">
                        <i class="bi bi-award-fill"></i>
                    </div>

                    <h3 th:text="${certificate.registration.event.namaEvent}">
                        Nama Event
                    </h3>

                    <p>
                        Sertifikat penyelesaian
                        <strong th:text="${certificate.registration.event.kategori}">
                            Workshop
                        </strong>
                    </p>

                    <p class="certificate-date">

                        <i class="bi bi-calendar-event-fill"></i>

                        <span th:text="${#temporals.format(
                                certificate.registration.event.tanggal,
                                'dd MMMM yyyy')}">
                        </span>

                    </p>

                    <p style="font-size:13px;color:#6b7280;">

                        Nomor Sertifikat :

                        <strong th:text="${certificate.nomorSertifikat}">
                            CERT-001
                        </strong>

                    </p>

                    <button class="btn"
                            th:onclick="|window.location.href='@{/certificate/download/{id}(id=${certificate.id})}'|">

                        <i class="bi bi-download"></i>

                        Download Sertifikat

                    </button>

                </div>

            </div>

        </main>

    </div>

</div>

</body>

</html>
