<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat - Ganesha Event Connect</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </aside>

        <!-- MAIN -->
        <div class="main">

            <!-- TOPBAR -->
            <header class="topbar">

                <div class="search-box">
                    <i class="ti ti-search"></i>
                    <input type="text" placeholder="Cari sertifikat...">
                </div>

                <div class="top-actions">

                    <div class="icon-btn">
                        <i class="ti ti-bell"></i>
                        <span class="dot"></span>
                    </div>

                    <div class="profile-chip">
                        <div class="avatar"></div>

                        <div>
                            <div class="pname">Adi Pratama</div>
                            <div class="prole">Mahasiswa</div>
                        </div>

                        <i class="ti ti-chevron-down" style="font-size:14px;color:var(--text-muted);">
                        </i>
                    </div>

                </div>

            </header>

            <!-- CONTENT -->
            <main class="content">

                <div class="page-title">
                    <h2>Sertifikat</h2>
                    <p>Sertifikat yang berhasil Anda peroleh.</p>
                </div>

                <div class="certificate-container">

                    <div class="certificate-card">

                        <div class="stat-icon icon-gold">
                            <i class="ti ti-certificate"></i>
                        </div>

                        <h3>Workshop UI/UX Design</h3>

                        <p>
                            Sertifikat penyelesaian Workshop UI/UX Design.
                        </p>

                        <p class="certificate-date">
                            📅 15 Juli 2026
                        </p>

                        <button class="btn" th:onclick="|window.location.href='@{/certificate/download/1}'|">
                            <i class="ti ti-download"></i>
                            Download Sertifikat
                        </button>

                    </div>

                    <div class="certificate-card">

                        <div class="stat-icon icon-gold">
                            <i class="ti ti-certificate"></i>
                        </div>

                        <h3>Bootcamp Web Development</h3>

                        <p>
                            Sertifikat penyelesaian Bootcamp Web Development.
                        </p>

                        <p class="certificate-date">
                            📅 28 Juli 2026
                        </p>

                        <button class="btn" th:onclick="|window.location.href='@{/certificate/download/1}'|">
                            <i class="ti ti-download"></i>
                            Download Sertifikat
                        </button>

                    </div>

                </div>

            </main>

        </div>

    </div>

</body>

</html>
